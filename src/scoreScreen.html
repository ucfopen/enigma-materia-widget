<!doctype html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="materia.scorecore.js"></script>

        <link rel="stylesheet" type="text/css" href="scoreScreen.css" />
        <title>Enigma Score Screen</title>
    </head>

    <body>
        <section id="mainContainer" class="container">
            <div id="message"></div>
            <h1 id="responses" class="headings">Assessment Complete</h1>
            <p class="sub-heading">Review your answers below</p>

            <!--new container specifically for the Question cards-->
            <div id="score-card-list">
            </div>
        </section>

        <template id="card-template">
        <div class="question-card">
            <div class="card-header">
                <span class="question-label">QUESTION #</span>
                <span class="badge">STATUS</span>
            </div>
            
            <div class="question-text">
                </div>
    
            <div class="answers-area">
                <div class="answer-box user-answer-box">
                    <label>YOUR ANSWER</label>
                    <p class="user-response-text"></p>
                </div>
    
                <div class="answer-box box-neutral">
                    <label>CORRECT ANSWER</label>
                    <p class="correct-response-text"></p>
                </div>
            </div>
        </div>
    </template>

        <!-- JS file. Capitalized second S?-->
        <script src="scoreScreen.js"></script>
    </body>

</html>
